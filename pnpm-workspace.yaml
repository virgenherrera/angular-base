packages:
  - "."

# Supply chain security: blocks packages published less than 24 hours ago (1440 minutes).
minimumReleaseAge: 1440

# Controls whether a package is allowed to run postinstall scripts.
# Investigate which deps need build permissions by running pnpm install and checking.
allowBuilds:
  "@parcel/watcher": true
  '@tailwindcss/oxide': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true

# Migrated from package.json "pnpm.overrides" + transitive vulnerability patches
overrides:
  "@modelcontextprotocol/sdk@>=1.10.0 <=1.25.3": ">=1.26.0"
  "qs@>=6.7.0 <=6.14.1": ">=6.14.2"
  # Transitive vulnerability patches (safe semver-compatible overrides)
  "@hono/node-server": ">=1.19.13"
  "ajv@>=7.0.0-alpha.0 <8.18.0": ">=8.18.0"
  brace-expansion: ">=2.0.3"
  express-rate-limit: ">=8.2.2"
  fast-uri: ">=3.1.2"
  flatted: ">=3.4.2"
  hono: ">=4.12.18"
  immutable: ">=5.1.5"
  ip-address: ">=10.1.1"
  minimatch: ">=10.2.3"
  path-to-regexp: ">=8.4.0"
  picomatch: ">=4.0.4"
  postcss: ">=8.5.10"
  qs: ">=6.15.2"
  rollup: ">=4.59.0"
  tar: ">=7.5.11"
  undici: "7.24.0"
  vite: ">=7.3.2"
  yaml: ">=2.8.3"

minimumReleaseAgeExclude: []

auditConfig:
  ignoreCves: []
